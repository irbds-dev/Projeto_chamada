{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conecta Presença</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <nav class="navbar">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🎓</span>
            <span class="font-bold text-[#1E5BB8] text-xl">Conecta Presença</span>
        </div>
        <div class="hidden md:flex gap-8 font-medium text-gray-600">
            {% if user.is_authenticated %}
                <a href="{% url 'turmas' %}">Turmas</a>
                <a href="{% url 'editarChamada' %}">Editar chamada</a>
                <a href="{% url 'analises' %}">Análises</a>
                <div class="relative group">
                    <button class="flex items-center gap-1 hover:text-[#1E5BB8] transition-colors">
                        Cadastro
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>

                    <div class="absolute left-0 mt-2 w-48 bg-white border border-gray-100 rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                        <div class="py-2">
                            <a href="{% url 'cadastroTurma' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-[#1E5BB8]">
                                Turma
                            </a>
                            <a href="{% url 'cadastroAluno' %}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-[#1E5BB8]">
                                Aluno
                            </a>
                        </div>
                    </div>
                </div>
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="text-red-500 font-medium hover:underline">
                        Sair
                    </button>
                </form>
            {% else %}
                <a href="{% url 'turmas' %}">Turmas</a>
                <a href="{% url 'login' %}">Login Coordenação</a>
            {% endif %}
        </div>
    </nav>

    <div class="container mx-auto px-4 pt-28">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
