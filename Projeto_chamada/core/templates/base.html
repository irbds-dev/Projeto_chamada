{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conecta Presença</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <nav class="navbar">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🎓</span>
            <span class="font-bold text-[#1E5BB8] text-xl">Conecta Presença</span>
        </div>
        <div class="hidden md:flex gap-8 font-medium text-gray-600">
            {% if user.is_authenticated %}
                <a href="{% url 'turmas' %}">Turmas</a>
                <a href="{% url 'analises' %}">Análises</a>
                {#<a href="{% url 'logout' %}" class="text-red-500">Sair</a>#}
            {% else %}
                <a href="{% url 'login' %}">Login Coordenação</a>
            {% endif %}
        </div>
    </nav>

    <div class="container mx-auto px-4 pt-28">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
