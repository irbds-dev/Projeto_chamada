{% extends 'base.html' %}
{% block content %}
<h1 class="text-3xl font-bold mb-8">Dashboard de Frequência</h1>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
    <div class="kpi-card border-l-8 border-[#58B947]">
        <p class="text-gray-500">Taxa de Presença Geral</p>
        <h2 class="text-4xl font-bold text-[#58B947]">92.4%</h2>
    </div>
    <div class="kpi-card border-l-8 border-red-500">
        <p class="text-gray-500">Taxa de Faltas</p>
        <h2 class="text-4xl font-bold text-red-500">7.6%</h2>
    </div>
    <div class="kpi-card border-l-8 border-orange-500">
        <p class="text-gray-500">Alunos em Risco</p>
        <h2 class="text-4xl font-bold text-orange-500">5</h2>
    </div>
</div>

<div class="bg-white p-8 rounded-xl shadow-sm">
    <h3 class="font-bold text-xl mb-6">Frequência Mensal por Período</h3>
    <div class="h-64 bg-gray-50 rounded-lg flex items-end justify-around p-4 gap-2">
        <div class="bg-[#1E5BB8] w-full" style="height: 80%"></div>
        <div class="bg-[#58B947] w-full" style="height: 95%"></div>
        <div class="bg-gray-300 w-full" style="height: 60%"></div>
    </div>
    <div class="flex justify-around mt-4 text-sm text-gray-500">
        <span>Diurno</span>
        <span>Vespertino</span>
        <span>Noturno</span>
    </div>
</div>
{% endblock %}
